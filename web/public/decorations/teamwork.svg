  <ellipse cx="285" cy="340" rx="38" ry="42" fill="#F57C00"/>
  <!-- Connecting arcs -->
  <path d="M155 310 Q180 280 195 310" stroke="#81C784" stroke-width="3" fill="none" stroke-linecap="round"/>
  <path d="M230 310 Q255 280 270 310" stroke="#FFB74D" stroke-width="3" fill="none" stroke-linecap="round"/>
  <!-- Star -->
  <polygon points="210,140 218,165 245,165 224,180 231,205 210,190 189,205 196,180 175,165 202,165" fill="#FFC107"/>
